<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kermesse – Feuille d'Inscription</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --sun: #FFD93D;
    --coral: #FF6B6B;
    --mint: #6BCB77;
    --sky: #4D96FF;
    --purple: #C77DFF;
    --orange: #FF9A3C;
    --bg: #FFF8ED;
    --card: #FFFFFF;
    --text: #2D2D2D;
    --muted: #888;
    --border: #E8E0D5;
    --shadow: 0 4px 20px rgba(0,0,0,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: linear-gradient(135deg, var(--coral) 0%, var(--orange) 50%, var(--sun) 100%);
    padding: 40px 20px 60px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    bottom: -2px; left: 0; right: 0;
    height: 40px;
    background: var(--bg);
    clip-path: ellipse(55% 100% at 50% 100%);
  }
  header h1 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2.2rem, 6vw, 3.8rem);
    color: #fff;
    text-shadow: 3px 4px 0 rgba(0,0,0,0.15);
    letter-spacing: 1px;
  }
  header p {
    color: rgba(255,255,255,0.92);
    font-size: 1.1rem;
    font-weight: 700;
    margin-top: 8px;
  }
  .banners {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-bottom: 16px;
    font-size: 1.8rem;
    animation: sway 3s ease-in-out infinite;
  }
  @keyframes sway { 0%,100%{transform:rotate(-2deg)} 50%{transform:rotate(2deg)} }

  /* LEGEND */
  .legend {
    display: flex;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
    padding: 20px;
    background: white;
    border-bottom: 2px dashed var(--border);
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--muted);
  }
  .dot { width: 12px; height: 12px; border-radius: 50%; }

  /* SEARCH / FILTER */
  .controls {
    max-width: 900px;
    margin: 24px auto 0;
    padding: 0 16px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
  }
  .search-box {
    flex: 1;
    min-width: 200px;
    padding: 10px 16px;
    border: 2px solid var(--border);
    border-radius: 50px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: border-color .2s;
    background: white;
  }
  .search-box:focus { border-color: var(--sky); }
  .filter-btn {
    padding: 9px 18px;
    border: 2px solid var(--border);
    border-radius: 50px;
    background: white;
    font-family: 'Nunito', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    transition: all .2s;
    color: var(--muted);
  }
  .filter-btn.active, .filter-btn:hover {
    background: var(--coral);
    border-color: var(--coral);
    color: white;
  }

  /* MAIN */
  main {
    max-width: 960px;
    margin: 24px auto 60px;
    padding: 0 16px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* STAND CARD */
  .stand-card {
    background: var(--card);
    border-radius: 20px;
    box-shadow: var(--shadow);
    overflow: hidden;
    border: 2px solid transparent;
    transition: transform .2s, box-shadow .2s;
  }
  .stand-card:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,0.12); }

  .stand-header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 18px 22px;
    cursor: pointer;
    user-select: none;
    position: relative;
  }
  .stand-emoji { font-size: 2rem; flex-shrink: 0; }
  .stand-title {
    font-family: 'Fredoka One', cursive;
    font-size: 1.25rem;
    color: white;
    flex: 1;
  }
  .stand-subtitle {
    font-size: 0.78rem;
    font-weight: 700;
    color: rgba(255,255,255,0.8);
    margin-top: 2px;
  }
  .spots-badge {
    background: rgba(255,255,255,0.25);
    color: white;
    font-size: 0.78rem;
    font-weight: 800;
    padding: 4px 10px;
    border-radius: 20px;
    white-space: nowrap;
  }
  .expand-btn {
    width: 28px; height: 28px;
    background: rgba(255,255,255,0.25);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: white;
    font-size: 1rem;
    transition: transform .3s;
    flex-shrink: 0;
  }
  .stand-card.open .expand-btn { transform: rotate(180deg); }

  /* BODY */
  .stand-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height .4s ease;
  }
  .stand-card.open .stand-body { max-height: 1200px; }

  .rules-block {
    background: #F9F5FF;
    border-left: 4px solid var(--purple);
    margin: 0 22px 16px;
    padding: 12px 16px;
    border-radius: 0 12px 12px 0;
    font-size: 0.88rem;
    color: #555;
    line-height: 1.6;
  }
  .rules-block strong { color: var(--purple); font-size: 0.8rem; text-transform: uppercase; letter-spacing: .5px; }

  /* ROLES */
  .roles-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0 1px;
    border-top: 1px solid var(--border);
  }
  @media(max-width: 600px) { .roles-grid { grid-template-columns: 1fr; } }

  .role-col {
    padding: 16px 22px;
    border-right: 1px solid var(--border);
  }
  .role-col:last-child { border-right: none; }

  .role-label {
    font-size: 0.78rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: .8px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .role-desc {
    font-size: 0.83rem;
    color: #555;
    line-height: 1.55;
    margin-bottom: 14px;
    padding: 8px 10px;
    background: #F7F7F7;
    border-radius: 10px;
  }

  /* TIME SLOTS */
  .slots-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
  }
  @media(max-width:400px) { .slots-row { grid-template-columns: repeat(2,1fr); } }

  .slot {
    position: relative;
    border: 2px solid var(--border);
    border-radius: 10px;
    padding: 8px 6px 6px;
    cursor: pointer;
    transition: all .15s;
    background: white;
    text-align: center;
  }
  .slot:hover:not(.taken) { border-color: var(--sky); background: #EBF4FF; }
  .slot.taken {
    background: #FFF5F5;
    border-color: #FFCDD2;
    cursor: not-allowed;
  }
  .slot.mine {
    background: #E8F8EC;
    border-color: var(--mint);
  }
  .slot-time {
    font-size: 0.72rem;
    font-weight: 800;
    color: var(--muted);
    display: block;
    margin-bottom: 4px;
  }
  .slot-name {
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--text);
    min-height: 18px;
    word-break: break-word;
  }
  .slot.taken .slot-name { color: var(--coral); }
  .slot.mine .slot-name { color: var(--mint); }

  /* MODAL */
  .modal-bg {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: white;
    border-radius: 24px;
    padding: 32px;
    max-width: 440px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    animation: pop .25s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes pop { from{transform:scale(.85);opacity:0} to{transform:scale(1);opacity:1} }
  .modal h2 { font-family:'Fredoka One',cursive; font-size:1.5rem; margin-bottom:6px; }
  .modal .slot-info { font-size:0.9rem; color:var(--muted); margin-bottom:20px; }
  .modal label { display:block; font-weight:800; font-size:0.85rem; margin-bottom:6px; }
  .modal input {
    width:100%; padding:11px 14px;
    border:2px solid var(--border);
    border-radius:12px;
    font-family:'Nunito',sans-serif;
    font-size:1rem;
    outline:none; margin-bottom:18px;
    transition:border-color .2s;
  }
  .modal input:focus { border-color:var(--sky); }
  .modal-btns { display:flex; gap:10px; }
  .btn-confirm {
    flex:1; padding:12px;
    background:var(--mint);
    color:white; border:none;
    border-radius:12px;
    font-family:'Nunito',sans-serif;
    font-weight:800; font-size:1rem;
    cursor:pointer; transition:background .2s;
  }
  .btn-confirm:hover { background:#4db85e; }
  .btn-cancel {
    padding:12px 18px;
    background:#F0F0F0; color:var(--muted);
    border:none; border-radius:12px;
    font-family:'Nunito',sans-serif;
    font-weight:700; cursor:pointer;
    transition:background .2s;
  }
  .btn-cancel:hover { background:#E0E0E0; }

  /* TOAST */
  .toast {
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px);
    background:#2D2D2D; color:white;
    padding:12px 24px; border-radius:50px;
    font-weight:700; font-size:0.9rem;
    z-index:200; transition:transform .3s, opacity .3s;
    opacity:0; pointer-events:none;
  }
  .toast.show { transform:translateX(-50%) translateY(0); opacity:1; }

  /* PROGRESS BAR */
  .progress-bar {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    margin: 4px 22px 12px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 3px;
    transition: width .3s;
  }

  /* SECTION HEADING */
  .section-heading {
    font-family: 'Fredoka One', cursive;
    font-size: 1rem;
    padding: 10px 22px 0;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* color bands */
  .color-0 .stand-header { background: linear-gradient(135deg,#FF6B6B,#FF9A3C); }
  .color-1 .stand-header { background: linear-gradient(135deg,#4D96FF,#6BCBFF); }
  .color-2 .stand-header { background: linear-gradient(135deg,#6BCB77,#A3E048); }
  .color-3 .stand-header { background: linear-gradient(135deg,#C77DFF,#FF9ED2); }
  .color-4 .stand-header { background: linear-gradient(135deg,#FFD93D,#FF9A3C); }
  .color-5 .stand-header { background: linear-gradient(135deg,#FF6B6B,#C77DFF); }
  .color-6 .stand-header { background: linear-gradient(135deg,#4D96FF,#6BCB77); }
  .color-7 .stand-header { background: linear-gradient(135deg,#FF9A3C,#FFD93D); }
  .color-8 .stand-header { background: linear-gradient(135deg,#6BCB77,#4D96FF); }

  .hidden { display: none !important; }
</style>
</head>
<body>

<header>
  <div class="banners">🎪 🎉 🎡 🎠 🎊 🎈 🎪</div>
  <h1>🎪 Kermesse du Lycée</h1>
  <p>Feuille d'inscription des animateurs — Cliquez sur un créneau libre pour vous inscrire !</p>
</header>

<div class="legend">
  <div class="legend-item"><div class="dot" style="background:#E0E0E0"></div> Libre</div>
  <div class="legend-item"><div class="dot" style="background:var(--coral)"></div> Occupé</div>
  <div class="legend-item"><div class="dot" style="background:var(--mint)"></div> Mon inscription</div>
  <div class="legend-item"><span>💡</span> Cliquer sur le titre pour voir les règles & rôles</div>
</div>

<div class="controls">
  <input class="search-box" type="text" placeholder="🔍  Rechercher un stand…" id="searchInput">
  <button class="filter-btn active" data-filter="all">Tous</button>
  <button class="filter-btn" data-filter="indoor">🏠 Intérieur</button>
  <button class="filter-btn" data-filter="outdoor">☀️ Extérieur</button>
  <button class="filter-btn" data-filter="free">🟢 Créneaux libres</button>
</div>

<main id="mainGrid"></main>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h2 id="modalTitle">S'inscrire</h2>
    <p class="slot-info" id="modalInfo"></p>
    <label for="nameInput">Votre prénom & nom</label>
    <input type="text" id="nameInput" placeholder="Ex : Marie Dupont" autocomplete="off">
    <div class="modal-btns">
      <button class="btn-confirm" id="btnConfirm">✅ Confirmer</button>
      <button class="btn-cancel" id="btnCancel">Annuler</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>

      'Distribue les balles · Explique les règles · Gère la file d\'attente · Vérifie qu\'un seul joueur joue à la fois.',

      'Tient les scores · Surveille la sécurité · Gère les rotations d\'équipes · Distribue les récompenses.'
    ]
  },
  {
    id:'accueil',
    emoji:'👋',
    name:'Accueil des familles / Expos',
    type:'indoor',
    rules:'Poste d\'accueil à l\'entrée de l\'espace maternelle. Orienter les familles, répondre aux questions, assurer une présence chaleureuse et informée tout au long de la kermesse.',
    roles:[
      'Accueil 1 : Accueille les familles · Oriente vers les espaces · Répond aux questions.\nAccueil 2 : Gère les flux d\'entrée · Oriente vers les activités et expositions.',
      'Accueil 3 : Accompagne les visiteurs · Donne les informations pratiques.\nAccueil 4 : Veille à la fluidité des déplacements · Aide les familles si besoin.'
    ],
    extraSlots: 2
  },
  {
    id:'caisse',

    name:'Caisse centrale',
    type:'indoor',
    rules:'Gestion de la billetterie et des paiements. Vente de tickets, remise de carnets ou jetons, information sur les tarifs. Poste clé pour la bonne organisation financière de la kermesse.',
    roles:[

      'Caisse 3 : Aide à fluidifier la file · Oriente les familles.\nCaisse 4 : Vérifie les stocks de tickets · Soutient les autres caisses si besoin.'
    ],
    extraSlots: 2
  }
];

// State: slots[standId][roleIdx][timeIdx] = name or null
const state = {};
STANDS.forEach(s => {
  const numRoles = s.extraSlots ? 4 : 2;
  state[s.id] = Array.from({length: numRoles}, () => Array(TIMES.length).fill(null));
});

let pending = null; // {standId, roleIdx, timeIdx}

function countFree(stand) {
  let free = 0;
  state[stand.id].forEach(role => role.forEach(v => { if (!v) free++; }));
  return free;
}
function countTotal(stand) {
  let total = 0;
  state[stand.id].forEach(role => role.forEach(() => total++));
  return total;
}

function render() {
  const grid = document.getElementById('mainGrid');
  grid.innerHTML = '';
  const search = document.getElementById('searchInput').value.toLowerCase();
  const activeFilter = document.querySelector('.filter-btn.active').dataset.filter;

  STANDS.forEach((stand, idx) => {
    const free = countFree(stand);
    const total = countTotal(stand);
    const filled = total - free;
    const pct = Math.round((filled / total) * 100);

    if (search && !stand.name.toLowerCase().includes(search)) return;
    if (activeFilter === 'indoor' && stand.type !== 'indoor') return;
    if (activeFilter === 'outdoor' && stand.type !== 'outdoor') return;
    if (activeFilter === 'free' && free === 0) return;

    const card = document.createElement('div');
    card.className = `stand-card color-${idx % 9}`;
    card.dataset.id = stand.id;

    const numRoles = state[stand.id].length;
    const roleLabels = numRoles === 4
      ? ['Poste 1','Poste 2','Poste 3','Poste 4']
      : ['Animateur 1','Animateur 2'];

    let slotsHTML = '';
    for (let r = 0; r < numRoles; r++) {
      let slotItems = '';
      TIMES.forEach((t, ti) => {
        const val = state[stand.id][r][ti];
        const cls = val ? (val === '__mine__' ? 'mine' : 'taken') : '';
        const display = val === '__mine__' ? 'Moi ✓' : (val || '');
        slotItems += `<div class="slot ${cls}" data-sid="${stand.id}" data-r="${r}" data-t="${ti}">
          <span class="slot-time">${t}</span>
          <span class="slot-name">${display || '+ S\'inscrire'}</span>
        </div>`;
      });

      const roleDesc = r < stand.roles.length ? stand.roles[r] : (r === 2 ? stand.roles[0] + ' (bis)' : stand.roles[1] + ' (bis)');
      slotsHTML += `<div class="role-col">
        <div class="role-label">${roleLabels[r]}</div>
        <div class="role-desc">${roleDesc.replace(/\n/g,'<br>')}</div>
        <div class="slots-row">${slotItems}</div>
      </div>`;
    }

    const fillColor = pct > 75 ? '#FF6B6B' : pct > 40 ? '#FFD93D' : '#6BCB77';

    card.innerHTML = `
      <div class="stand-header">
        <span class="stand-emoji">${stand.emoji}</span>
        <div style="flex:1">
          <div class="stand-title">${stand.name}</div>
          <div class="stand-subtitle">${stand.type === 'outdoor' ? '☀️ Extérieur' : '🏠 Intérieur'} · ${numRoles} postes</div>
        </div>
        <span class="spots-badge">${free} créneau${free>1?'x':''} libre${free>1?'s':''}</span>
        <div class="expand-btn">▼</div>
      </div>
      <div class="stand-body">
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${fillColor}"></div></div>
        <div class="rules-block"><strong>📋 Règles du jeu</strong><br>${stand.rules}</div>
        <div class="roles-grid">${slotsHTML}</div>
      </div>
    `;

    card.querySelector('.stand-header').addEventListener('click', () => {
      card.classList.toggle('open');
    });

    card.querySelectorAll('.slot:not(.taken)').forEach(slot => {
      slot.addEventListener('click', e => {
        e.stopPropagation();
        const sid = slot.dataset.sid;
        const r = +slot.dataset.r;
        const t = +slot.dataset.t;
        if (slot.classList.contains('mine')) {
          // Unregister
          state[sid][r][t] = null;
          render();
          showToast('Inscription annulée.');
          return;
        }
        pending = {sid, r, t};
        document.getElementById('modalTitle').textContent = `S'inscrire — ${stand.name}`;
        document.getElementById('modalInfo').textContent = `${roleLabels[r]} · Créneau ${TIMES[t]}`;
        document.getElementById('nameInput').value = '';
        document.getElementById('modalBg').classList.add('open');
        setTimeout(() => document.getElementById('nameInput').focus(), 100);
      });
    });

    grid.appendChild(card);
  });
}

document.getElementById('btnConfirm').addEventListener('click', () => {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) { document.getElementById('nameInput').focus(); return; }
  if (pending) {
    const {sid, r, t} = pending;
    // Check if user already registered here (simple: check for __mine__)
    const alreadyMine = state[sid].some(role => role.some(v => v === '__mine__'));
    state[sid][r][t] = '__mine__';
    pending = null;
  }
  document.getElementById('modalBg').classList.remove('open');
  // Store name in slot display
  const {sid, r, t} = pending || {};
  render();
  showToast('✅ Inscription confirmée !');
});

// Fix: store name properly
document.getElementById('btnConfirm').addEventListener('click', () => {}, {capture: true});

// Rewrite confirm with name
document.getElementById('btnConfirm').onclick = () => {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) { document.getElementById('nameInput').style.borderColor='var(--coral)'; return; }
  document.getElementById('nameInput').style.borderColor='';
  if (pending) {
    const {sid, r, t} = pending;
    state[sid][r][t] = name;
    pending = null;
    document.getElementById('modalBg').classList.remove('open');
    render();
    showToast(`✅ ${name} inscrit(e) !`);
  }
};

document.getElementById('btnCancel').onclick = () => {
  pending = null;
  document.getElementById('modalBg').classList.remove('open');
};
document.getElementById('modalBg').addEventListener('click', e => {
  if (e.target === document.getElementById('modalBg')) {
    pending = null;
    document.getElementById('modalBg').classList.remove('open');
  }
});
document.getElementById('nameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('btnConfirm').click();
});

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

document.getElementById('searchInput').addEventListener('input', render);
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });
});
